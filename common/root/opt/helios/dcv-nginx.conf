events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
      listen 3000 ssl;
      listen [::]:3000 ssl;
      listen 3001;
      listen [::]:3001;
      ssl_certificate           /opt/helios/ssl/cert.pem;
      ssl_certificate_key       /opt/helios/ssl/cert.key;
      location SUBFOLDER {
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;
        proxy_set_header        Host $http_host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_http_version      1.1;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        proxy_connect_timeout   3600s;
        proxy_buffering         off;
        client_max_body_size    10M;
        proxy_ssl_verify        off;
        # dcvserver sends X-Frame-Options: DENY; drop it so the client can
        # be embedded in an iframe from any origin
        proxy_hide_header       X-Frame-Options;
        # Wildcard CORS so cross-origin embedders can fetch DCV resources
        add_header              Access-Control-Allow-Origin "*" always;
        add_header              Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header              Access-Control-Allow-Headers "*" always;
        if ($request_method = OPTIONS) {
          return 204;
        }
        proxy_pass              https://127.0.0.1:8082;
      }
    }
}
