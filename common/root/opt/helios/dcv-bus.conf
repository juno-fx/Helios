<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  Private D-Bus instance for DCV virtual sessions.

  dcvserver (running as ${USER}) and dcvsessionlauncher (running as root)
  must share one bus: the launcher hard-codes the system bus while a
  non-systemd dcvserver autolaunches a session bus, so neither default works.
  A system-type bus accepts connections from multiple uids; the permissive
  policy is fine because the socket lives inside the container and only DCV
  components connect to it.
-->
<busconfig>
  <type>system</type>
  <listen>unix:path=/run/dcv/bus</listen>
  <auth>EXTERNAL</auth>
  <policy context="default">
    <allow user="*"/>
    <allow own="*"/>
    <allow send_destination="*"/>
    <allow receive_sender="*"/>
  </policy>
</busconfig>
