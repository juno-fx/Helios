services:
  helios:
    image: junoinnovations/helios:unstable-jammy
    hostname: "helios"
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helios
#    pre_stop:
#      - command: /etc/helios/shutdown.d/custom.sh
#    volumes:
#      - /dev/dri:/dev/dri
#      - .out/:/mnt/
#      - .home:/home/
    environment:
      - USER=helios
      - UID=5040
      - SUDO=true
#      - DISABLE_VGL=1
#      - DESKTOP_FILES="/desktops/*.desktop:/tmp/*.desktop"
#      - IDLE_TIME=1
#      - PASSWORD=password
#      - PREFIX=/custom/prefix
      - REMOTE_PROTOCOL=${REMOTE_PROTOCOL:-selkies}  # selkies|dcv
      - DCV_SESSION_TYPE=${DCV_SESSION_TYPE:-console}  # console|virtual (dcv only)
#      - DCV_LICENSE_FILE=/path/to/license.lic  # DCV license for non-EC2 usage
    # Required for DCV virtual sessions: the server authorizes its agent by
    # reading /proc/<pid>/exe of the (non-root) session user's processes
    cap_add:
      - SYS_PTRACE
    ports:
      - "3000:3000"
      - "3001:3001"
